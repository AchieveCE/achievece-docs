<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AchieveCE API Documentation</title>
    <meta name="description" content="Courses, Packages, Faculty, FindCE, and SEO API reference and internal guides for AchieveCE." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        --scalar-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --scalar-color-1: #03071c;
        --scalar-color-2: #494a57;
        --scalar-color-3: #8e8f9b;
        --scalar-color-accent: #0d9488;
        --scalar-color-background-1: #ffffff;
        --scalar-color-background-2: #f8f9fc;
        --scalar-color-background-3: #f1f2f6;
        --scalar-radius: 8px;
        --scalar-radius-lg: 12px;
      }
      .dark-mode {
        --scalar-color-1: #f8f9fc;
        --scalar-color-2: #b4b5bf;
        --scalar-color-3: #8e8f9b;
        --scalar-color-background-1: #000212;
        --scalar-color-background-2: #0c0e21;
        --scalar-color-background-3: #1a1c30;
      }
      html, body { margin: 0; padding: 0; height: 100%; }
      body { font-family: var(--scalar-font); background: var(--scalar-color-background-1); color: var(--scalar-color-1); }
      #auth-gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #0d9488 0%, #0f172a 100%); }
      #auth-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 420px; width: 90%; text-align: center; }
      #auth-card h2 { margin: 0 0 10px 0; color: #03071c; font-size: 22px; font-weight: 600; }
      #auth-card p { margin: 0 0 24px 0; color: #494a57; font-size: 14px; }
      #sign-in-btn { width: 100%; padding: 12px 16px; background: #0d9488; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
      #sign-in-btn:hover { background: #0f766e; }
      .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; margin: 0 auto 12px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      #docs-shell { display: none; min-height: 100vh; flex-direction: column; }
      #docs-shell.authenticated { display: flex; }
      .docs-topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 12px 20px; background: var(--scalar-color-background-2); border-bottom: 1px solid var(--scalar-color-background-3); flex-shrink: 0; }
      .docs-brand { display: flex; align-items: baseline; gap: 10px; }
      .docs-brand strong { color: var(--scalar-color-1); font-size: 16px; font-weight: 600; }
      .docs-brand span { color: var(--scalar-color-2); font-size: 13px; }
      .docs-tabs { display: flex; gap: 4px; }
      .docs-tab { background: transparent; border: 1px solid transparent; color: var(--scalar-color-2); font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
      .docs-tab:hover { color: var(--scalar-color-1); }
      .docs-tab.active { background: var(--scalar-color-background-3); color: var(--scalar-color-1); }
      .docs-user { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--scalar-color-2); }
      .docs-user .role-pill { padding: 3px 10px; border-radius: 999px; background: #0d9488; color: white; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
      .docs-user .role-pill.consumer { background: #475569; }
      #sign-out-btn { padding: 6px 12px; background: transparent; color: var(--scalar-color-2); border: 1px solid var(--scalar-color-background-3); border-radius: 6px; font-size: 12px; cursor: pointer; }
      #sign-out-btn:hover { color: #ef4444; border-color: #ef4444; }
      #scalar-root { flex: 1; min-height: 0; }
      #guides-root { flex: 1; min-height: 0; display: flex; }
      .new-dot { display: inline-block; width: 8px; height: 8px; margin-left: 6px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 0 2px rgba(239,68,68,0.25); flex-shrink: 0; vertical-align: middle; pointer-events: none; }
      .guides-shell { display: flex; flex: 1; min-width: 0; min-height: 0; background: var(--scalar-color-background-1); color: var(--scalar-color-1); position: relative; }
      .guides-shell::before { content: ""; position: absolute; inset: 0; pointer-events: none; background: radial-gradient(80% 50% at 50% -20%, rgba(120, 119, 198, 0.22), rgba(0, 0, 0, 0)); z-index: 0; }
      .guides-shell > * { position: relative; z-index: 1; }
      .guides-sidebar { width: 280px; flex-shrink: 0; border-right: 1px solid var(--scalar-color-background-3); background: transparent; overflow-y: auto; }
      .guides-sidebar-inner { padding: 20px 14px 32px; }
      .guides-home { display: block; padding: 8px 12px; margin-bottom: 8px; color: var(--scalar-color-2); font-size: 13px; font-weight: 500; text-decoration: none; border-radius: 6px; }
      .guides-home:hover { background: var(--scalar-color-background-2); color: var(--scalar-color-1); }
      .guides-cat { margin-top: 18px; }
      .guides-cat-title { padding: 0 12px 6px; color: var(--scalar-color-3); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; }
      .guides-cat ul { list-style: none; margin: 0; padding: 0; }
      .guides-link { display: block; padding: 6px 12px; border-radius: 6px; color: var(--scalar-color-2); text-decoration: none; font-size: 13px; line-height: 1.5; }
      .guides-link:hover { background: var(--scalar-color-background-2); color: var(--scalar-color-1); }
      .guides-link.active { background: var(--scalar-color-background-3); color: var(--scalar-color-1); font-weight: 500; }
      .guides-sidebar-empty { padding: 20px 14px; color: var(--scalar-color-3); font-size: 13px; }
      .guides-main { flex: 1; min-width: 0; overflow-y: auto; padding: 40px 48px; }
      .guides-landing { max-width: 1080px; }
      .guides-landing h1 { margin: 0 0 6px; font-size: 28px; font-weight: 600; letter-spacing: -0.01em; }
      .guides-landing-sub { color: var(--scalar-color-2); font-size: 14px; margin: 0 0 28px; }
      .guide-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
      .guide-card { display: block; padding: 18px 20px; border: 1px solid var(--scalar-color-background-3); border-radius: 10px; text-decoration: none; color: inherit; background: var(--scalar-color-background-2); transition: border-color 120ms ease, transform 120ms ease; }
      .guide-card:hover { border-color: var(--scalar-color-accent); transform: translateY(-1px); }
      .guide-card-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; color: var(--scalar-color-1); }
      .guide-card-summary { color: var(--scalar-color-2); font-size: 13px; line-height: 1.5; margin-bottom: 12px; }
      .guide-card-meta { color: var(--scalar-color-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
      .guides-card { max-width: 520px; padding: 24px 28px; border: 1px solid var(--scalar-color-background-3); border-radius: 10px; background: var(--scalar-color-background-2); }
      .guides-card h2 { margin: 0 0 8px; font-size: 18px; font-weight: 600; }
      .guides-card p { color: var(--scalar-color-2); font-size: 14px; margin: 0; }
      .guides-card a { color: var(--scalar-color-accent); }
      .guides-empty { color: var(--scalar-color-2); }
      .guide-article { max-width: 760px; font-size: 15px; line-height: 1.7; }
      .guide-article h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 18px; }
      .guide-article h2 { font-size: 20px; font-weight: 600; margin: 32px 0 12px; }
      .guide-article h3 { font-size: 16px; font-weight: 600; margin: 24px 0 10px; }
      .guide-article p { margin: 0 0 14px; color: var(--scalar-color-2); }
      .guide-article pre { background: var(--scalar-color-background-2); border: 1px solid var(--scalar-color-background-3); color: #f8f9fc; padding: 14px 16px; border-radius: 8px; overflow-x: auto; font-size: 13px; margin: 16px 0; }
      .guide-article code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9em; }
      .guide-article :not(pre) > code { background: var(--scalar-color-background-3); color: var(--scalar-color-1); padding: 1px 6px; border-radius: 4px; }
      .guide-article a { color: var(--scalar-color-accent); text-decoration: none; border-bottom: 1px solid rgba(13,148,136,0.3); }
      .guide-article a:hover { border-bottom-color: var(--scalar-color-accent); }
      .guide-article ul, .guide-article ol { margin: 0 0 14px; padding-left: 22px; color: var(--scalar-color-2); }
      .guide-article li { margin: 4px 0; }
      .guide-article li > p { margin: 0; }
      .guide-article blockquote { margin: 16px 0; padding: 8px 16px; border-left: 3px solid var(--scalar-color-accent); background: var(--scalar-color-background-2); color: var(--scalar-color-2); border-radius: 0 6px 6px 0; }
      .guide-article hr { border: none; border-top: 1px solid var(--scalar-color-background-3); margin: 32px 0; }
      .guide-article table { width: 100%; border-collapse: collapse; margin: 18px 0; font-size: 14px; display: block; overflow-x: auto; }
      .guide-article table thead { background: var(--scalar-color-background-2); }
      .guide-article table th { text-align: left; padding: 10px 14px; font-weight: 600; color: var(--scalar-color-1); border: 1px solid var(--scalar-color-background-3); white-space: nowrap; }
      .guide-article table td { padding: 10px 14px; color: var(--scalar-color-2); border: 1px solid var(--scalar-color-background-3); vertical-align: top; }
      .guide-article table tbody tr:nth-child(even) td { background: var(--scalar-color-background-2); }
      .guide-article table strong { color: var(--scalar-color-1); }
      .guide-article .timeline { display: flex; flex-direction: column; gap: 14px; margin: 24px 0; }
      .guide-article .timeline-day { display: grid; grid-template-columns: 120px 1fr; gap: 16px; align-items: stretch; }
      .guide-article .timeline-day-label { display: flex; align-items: center; justify-content: center; padding: 10px 12px; background: var(--scalar-color-accent); color: #ffffff; border-radius: 8px; font-weight: 600; font-size: 13px; letter-spacing: 0.02em; text-align: center; line-height: 1.3; }
      .guide-article .timeline-day-content { padding: 14px 18px; background: var(--scalar-color-background-2); border: 1px solid var(--scalar-color-background-3); border-left: 3px solid var(--scalar-color-accent); border-radius: 8px; color: var(--scalar-color-2); font-size: 14px; line-height: 1.6; }
      .guide-article .timeline-day-content p { margin: 0; color: inherit; }
      .guide-article .timeline-day-branches { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .guide-article .timeline-branch { padding: 14px 16px; border-radius: 8px; font-size: 14px; line-height: 1.55; }
      .guide-article .timeline-branch-title { font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
      .guide-article .timeline-branch.recovered { background: #ecfdf5; border: 1px solid #a7f3d0; border-left: 3px solid #10b981; color: #064e3b; }
      .guide-article .timeline-branch.recovered .timeline-branch-title { color: #047857; }
      .guide-article .timeline-branch.failed { background: #fef2f2; border: 1px solid #fecaca; border-left: 3px solid #dc2626; color: #7f1d1d; }
      .guide-article .timeline-branch.failed .timeline-branch-title { color: #b91c1c; }
      @media (max-width: 640px) {
        .guide-article .timeline-day { grid-template-columns: 1fr; }
        .guide-article .timeline-day-label { justify-content: flex-start; }
        .guide-article .timeline-day-branches { grid-template-columns: 1fr; }
      }
      .guide-article .comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
      .guide-article .comparison-card { padding: 18px 20px; border-radius: 10px; border: 1px solid var(--scalar-color-background-3); background: var(--scalar-color-background-2); display: flex; flex-direction: column; gap: 10px; }
      .guide-article .comparison-card-header { font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; padding-bottom: 8px; border-bottom: 1px solid var(--scalar-color-background-3); }
      .guide-article .comparison-card ol { margin: 0; padding-left: 20px; color: var(--scalar-color-2); font-size: 14px; line-height: 1.6; }
      .guide-article .comparison-card ol li { margin: 6px 0; }
      .guide-article .comparison-card.removed { background: #fef2f2; border-color: #fecaca; border-left: 3px solid #dc2626; }
      .guide-article .comparison-card.removed .comparison-card-header { color: #b91c1c; border-bottom-color: #fecaca; }
      .guide-article .comparison-card.removed ol { color: #7f1d1d; }
      .guide-article .comparison-card.current { background: #ecfdf5; border-color: #a7f3d0; border-left: 3px solid #10b981; }
      .guide-article .comparison-card.current .comparison-card-header { color: #047857; border-bottom-color: #a7f3d0; }
      .guide-article .comparison-card.current ol { color: #064e3b; }
      @media (max-width: 640px) {
        .guide-article .comparison { grid-template-columns: 1fr; }
      }
      .guide-article .mermaid { display: flex; justify-content: center; padding: 24px; margin: 20px 0; background: #ffffff; border: 1px solid var(--scalar-color-background-3); border-radius: 8px; overflow-x: auto; color: #1e293b; }
      .guide-article .mermaid svg { max-width: 100%; height: auto; }
      .guide-article .mermaid svg text,
      .guide-article .mermaid svg .nodeLabel,
      .guide-article .mermaid svg .edgeLabel,
      .guide-article .mermaid svg .edgeLabel p,
      .guide-article .mermaid svg .messageText,
      .guide-article .mermaid svg foreignObject div { color: #1e293b !important; fill: #1e293b !important; }
      .guide-article .mermaid svg .edgeLabel { background-color: #ffffff !important; }
      .guide-article .mermaid svg .edgeLabel rect { fill: #ffffff !important; }
      .guide-footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--scalar-color-background-3); color: var(--scalar-color-3); font-size: 12px; }
      .guide-footer a { color: var(--scalar-color-2); }
    </style>
  </head>
  <body>
    <div id="auth-gate">
      <div id="auth-card">
        <div class="spinner" style="border-color: rgba(13,148,136,0.2); border-top-color: #0d9488;"></div>
        <p style="color: #0d9488; margin: 0;">Loading…</p>
      </div>
    </div>
    <div id="docs-shell">
      <header class="docs-topbar">
        <div class="docs-brand">
          <strong>AchieveCE</strong>
          <span>Docs</span>
        </div>
        <nav class="docs-tabs">
          <button id="tab-api" class="docs-tab active" type="button">API Reference</button>
          <button id="tab-guides" class="docs-tab" type="button">Guides</button>
        </nav>
        <div class="docs-user">
          <span id="user-email"></span>
          <span id="user-role" class="role-pill"></span>
          <button id="sign-out-btn">Sign out</button>
        </div>
      </header>
      <div id="scalar-root"></div>
      <div id="guides-root" style="display: none;"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
