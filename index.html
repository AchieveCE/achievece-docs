<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AchieveCE API Documentation</title>
    <meta
      name="description"
      content="Faculty and SEO API reference for AchieveCE — API key authentication, rate limits, and request/response shapes."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        --scalar-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        --scalar-color-1: #03071c;
        --scalar-color-2: #494a57;
        --scalar-color-3: #8e8f9b;
        --scalar-color-accent: #0d9488;
        --scalar-color-background-1: #ffffff;
        --scalar-color-background-2: #f8f9fc;
        --scalar-color-background-3: #f1f2f6;
        --scalar-radius: 8px;
        --scalar-radius-lg: 12px;
      }

      .dark-mode {
        --scalar-color-1: #f8f9fc;
        --scalar-color-2: #b4b5bf;
        --scalar-color-3: #8e8f9b;
        --scalar-color-background-1: #0f0f14;
        --scalar-color-background-2: #1a1a24;
        --scalar-color-background-3: #25252f;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      .docs-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: var(--scalar-font);
      }

      .docs-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 20px;
        flex-shrink: 0;
        background: var(--scalar-color-background-2);
        border-bottom: 1px solid var(--scalar-color-background-3);
      }

      .docs-brand {
        display: flex;
        align-items: baseline;
        gap: 10px;
      }

      .docs-brand strong {
        color: var(--scalar-color-1);
        font-size: 16px;
        font-weight: 600;
      }

      .docs-brand span {
        color: var(--scalar-color-2);
        font-size: 13px;
      }

      .docs-note {
        color: var(--scalar-color-2);
        font-size: 12px;
        max-width: 480px;
        text-align: right;
        line-height: 1.4;
      }

      #scalar-root {
        flex: 1;
        min-height: 0;
      }

      @media (max-width: 720px) {
        .docs-topbar {
          flex-direction: column;
          align-items: flex-start;
        }
        .docs-note {
          text-align: left;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="docs-shell">
      <header class="docs-topbar">
        <div class="docs-brand">
          <strong>AchieveCE</strong>
          <span>Public API reference</span>
        </div>
        <p class="docs-note">
          Endpoints require a Bearer API key. Canonical OpenAPI lives in the
          <strong>achievece-web</strong> repo:
          <code>docs/openapi/achievece-public-api.yaml</code> (synced here as
          <code>public/openapi/achievece.yaml</code>).
        </p>
      </header>
      <div id="scalar-root"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    <script>
      Scalar.createApiReference("#scalar-root", {
        url: "/openapi/achievece.yaml",
        theme: "kepler",
        layout: "modern",
        darkMode: true,
        hiddenClients: ["unirest"],
        searchHotKey: "k",
        metaData: {
          title: "AchieveCE API Documentation",
          description: "Faculty and SEO APIs for AchieveCE",
        },
        hideModels: false,
        hideDownloadButton: false,
        defaultHttpClient: {
          targetKey: "javascript",
          clientKey: "fetch",
        },
      });
    </script>
  </body>
</html>
