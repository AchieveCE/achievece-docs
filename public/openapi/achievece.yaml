openapi: 3.1.0
info:
  title: AchieveCE Public API
  version: 1.1.0
  description: |
    API key authenticated endpoints for courses, packages, faculty, continuing education requirements, and SEO override management.

    ## Environments

    All paths below are relative to a **base URL** (scheme + host, no trailing slash).

    | Environment | Base URL | When to use |
    |-------------|----------|-------------|
    | **Staging** | `https://staging.achievece.com` | Integration testing, QA, and validating changes before production |
    | **Production** | `https://achievece.com` | Live traffic and production API keys |
    | **Local** | `http://localhost:3000` | When running the Next.js app locally |

    Use **staging** for API integration work and testing; production keys and data should only be exercised against production when you intend to go live.

    ## Authentication

    Send your API key in the `Authorization` header:

    ```
    Authorization: Bearer <api_key>
    ```

    Keys are issued via the admin API key management routes (session-authenticated, not documented here).

    ## Scopes

    | Scope | Access |
    |-------|--------|
    | `courses:read` | Course list and detail |
    | `packages:read` | Package list |
    | `faculty:read` | Faculty list and detail |
    | `findce:read` | State CE requirements |
    | `seo:read` | Read SEO inventory, metadata, JSON-LD, previews, override list |
    | `seo:write` | Create/update/delete pending overrides |
    | `seo:admin` | Approve, reject, pending queue, deploy |

    ## Success and error shapes

    **Single resource:** `{ "data": ... }`

    **Paginated list:** `{ "data": [...], "meta": { "total", "page", "perPage", "totalPages" }, "links": { "self", "next", "prev", "first", "last" } }`

    **Error:** `{ "error": { "code": string, "message": string, "details"?: unknown[] } }`

    ## Rate limits

    Responses include `X-RateLimit-Limit`, `X-RateLimit-Remaining`, and `X-RateLimit-Reset` (standard vs premium tiers apply per key).
  contact:
    name: AchieveCE
    url: https://achievece.com
  license:
    name: Proprietary
    url: https://achievece.com

servers:
  - url: https://achievece.com
    description: Production
  - url: https://staging.achievece.com
    description: Staging (use for integration testing and QA)
  - url: http://localhost:3000
    description: Local development

security:
  - ApiKeyAuth: []

tags:
  - name: Courses
    description: Public course catalog API (`courses:read`)
  - name: Packages
    description: Public package listings API (`packages:read`)
  - name: Faculty
    description: Public faculty API (`faculty:read`)
  - name: FindCE
    description: State continuing education requirements (`findce:read`)
  - name: SEO — Read
    description: Read current SEO state and overrides (`seo:read`)
  - name: SEO — Write
    description: Create or update pending overrides (`seo:write`)
  - name: SEO — Admin
    description: Approve, reject, deploy (`seo:admin`)

paths:
  # ── Courses ──────────────────────────────────────────────
  /api/v1/courses:
    get:
      operationId: listCourses
      summary: List courses
      description: |
        Paginated course catalog with optional search, filters, sort, sparse fieldsets, and includes.

        Sort: prefix field with `-` for descending (e.g. `-price`). Allowed fields: `name`, `price`, `duration`, `created_at`, `updated_at`, `release_date`.

        Include: comma-separated `mainInstructor`, `instructors`, `subjectAreas`, `accreditations`, `targetAudiences`, `packages`.
      tags: [Courses]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: search
          in: query
          schema:
            type: string
            maxLength: 200
        - name: sort
          in: query
          description: "e.g. `name`, `-price`, `-release_date`"
          schema:
            type: string
        - name: activityType
          in: query
          schema:
            type: string
        - name: deliveryType
          in: query
          schema:
            type: string
        - name: isPopular
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: isTrending
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: include
          in: query
          description: Comma-separated includes
          schema:
            type: string
            example: mainInstructor,subjectAreas
        - name: fields
          in: query
          description: Comma-separated sparse fields
          schema:
            type: string
      responses:
        "200":
          description: Paginated courses
          headers:
            X-RateLimit-Limit:
              schema:
                type: string
            X-RateLimit-Remaining:
              schema:
                type: string
            X-RateLimit-Reset:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCourseResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/courses/{slug}:
    get:
      operationId: getCourseBySlug
      summary: Get course by slug
      tags: [Courses]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: include
          in: query
          description: Comma-separated includes
          schema:
            type: string
        - name: fields
          in: query
          description: Comma-separated sparse fields
          schema:
            type: string
      responses:
        "200":
          description: Course record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleCourseResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Packages ─────────────────────────────────────────────
  /api/v1/packages:
    get:
      operationId: listPackages
      summary: List packages
      description: |
        Paginated package listings with optional search, filters, sort, sparse fieldsets, and includes.

        Sort: prefix field with `-` for descending (e.g. `-price`). Allowed fields: `name`, `price`, `duration`, `created_at`, `updated_at`.

        Include: comma-separated `courses`, `stateProfessions`.
      tags: [Packages]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: search
          in: query
          schema:
            type: string
            maxLength: 200
        - name: sort
          in: query
          description: "e.g. `name`, `-price`"
          schema:
            type: string
        - name: isPopular
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: isTrending
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: include
          in: query
          description: Comma-separated includes
          schema:
            type: string
            example: courses,stateProfessions
        - name: fields
          in: query
          description: Comma-separated sparse fields
          schema:
            type: string
      responses:
        "200":
          description: Paginated packages
          headers:
            X-RateLimit-Limit:
              schema:
                type: string
            X-RateLimit-Remaining:
              schema:
                type: string
            X-RateLimit-Reset:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPackageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Faculty ──────────────────────────────────────────────
  /api/v1/faculty:
    get:
      operationId: listFaculty
      summary: List faculty
      description: |
        Paginated instructors with optional search, filters, sort, sparse fieldsets, and includes.
        Sort: prefix field with `-` for descending (e.g. `-created_at`). Allowed fields: `name`, `created_at`, `updated_at`.
        Include: comma-separated `courses`, `specialties`, `profession`.
      tags: [Faculty]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: search
          in: query
          schema:
            type: string
            maxLength: 200
        - name: sort
          in: query
          description: e.g. `name`, `-created_at`
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, pending]
        - name: profession
          in: query
          schema:
            type: string
        - name: specialty
          in: query
          schema:
            type: string
        - name: include
          in: query
          description: Comma-separated includes
          schema:
            type: string
            example: courses,specialties
        - name: fields
          in: query
          description: Comma-separated sparse fields
          schema:
            type: string
      responses:
        "200":
          description: Paginated faculty
          headers:
            X-RateLimit-Limit:
              schema:
                type: string
            X-RateLimit-Remaining:
              schema:
                type: string
            X-RateLimit-Reset:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedFacultyResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/faculty/{slug}:
    get:
      operationId: getFacultyBySlug
      summary: Get faculty by slug
      tags: [Faculty]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: include
          in: query
          schema:
            type: string
        - name: fields
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Faculty record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleFacultyResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── FindCE ───────────────────────────────────────────────
  /api/v1/findce/{state}/{profession}:
    get:
      operationId: getFindCeRequirements
      summary: Get state CE requirements
      description: |
        Returns continuing education requirements for a specific state and profession combination.

        Include: comma-separated `renewalRequirements`, `packages`, `courses`, `accreditation`, `accreditationsList`.
      tags: [FindCE]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: state
          in: path
          required: true
          description: State slug (e.g. `florida`, `texas`)
          schema:
            type: string
        - name: profession
          in: path
          required: true
          description: Profession slug (e.g. `pharmacy`, `nursing`)
          schema:
            type: string
        - name: include
          in: query
          description: Comma-separated includes
          schema:
            type: string
            example: renewalRequirements,packages,courses
        - name: fields
          in: query
          description: Comma-separated sparse fields (applied to the stateProfession object)
          schema:
            type: string
      responses:
        "200":
          description: State CE requirement data
          headers:
            X-RateLimit-Limit:
              schema:
                type: string
            X-RateLimit-Remaining:
              schema:
                type: string
            X-RateLimit-Reset:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleFindCeResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── SEO ──────────────────────────────────────────────────
  /api/seo/inventory:
    get:
      operationId: seoInventory
      summary: SEO page inventory
      tags: [SEO — Read]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Inventory payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleDataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/seo/metadata:
    get:
      operationId: getSeoMetadata
      summary: Metadata for URL
      tags: [SEO — Read]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
      responses:
        "200":
          description: Current metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleDataResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: putSeoMetadata
      summary: Create metadata override
      description: |
        Create a pending metadata override for a URL.

        `payload.title` supports two modes:
        - string: uses the app's shared title template for that URL
        - `{ absolute: "Final Title" }`: sets a final URL-specific title and bypasses the shared template
      tags: [SEO — Write]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMetadataBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleDataResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/seo/json-ld:
    get:
      operationId: getSeoJsonLd
      summary: JSON-LD for URL
      tags: [SEO — Read]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
      responses:
        "200":
          description: JSON-LD data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleDataResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: postSeoJsonLd
      summary: Create JSON-LD override
      tags: [SEO — Write]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJsonLdBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleDataResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/seo/json-ld/{id}:
    put:
      operationId: putSeoJsonLdById
      summary: Update pending JSON-LD override
      tags: [SEO — Write]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJsonLdBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleDataResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteSeoJsonLdById
      summary: Delete pending JSON-LD override
      tags: [SEO — Write]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/seo/json-ld/site-wide:
    post:
      operationId: postSeoJsonLdSiteWide
      summary: Create site-wide JSON-LD override
      tags: [SEO — Write]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSiteWideBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleDataResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/seo/preview:
    get:
      operationId: seoPreview
      summary: Preview merged SEO (optional pending)
      tags: [SEO — Read]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: includePending
          in: query
          description: Set to `false` to exclude pending overrides (default true)
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: Preview payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleDataResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/seo/overrides:
    get:
      operationId: listSeoOverrides
      summary: List overrides
      tags: [SEO — Read]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: url
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [json_ld, metadata]
      responses:
        "200":
          description: Paginated overrides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDataResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/seo/pending:
    get:
      operationId: listSeoPending
      summary: List all pending changes (admin)
      tags: [SEO — Admin]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Pending items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleDataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/seo/approve/{id}:
    post:
      operationId: approveSeoOverride
      summary: Approve override
      tags: [SEO — Admin]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleDataResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/seo/approve/batch:
    post:
      operationId: approveSeoBatch
      summary: Approve multiple overrides
      tags: [SEO — Admin]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleDataResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/seo/reject/{id}:
    post:
      operationId: rejectSeoOverride
      summary: Reject override
      tags: [SEO — Admin]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note:
                  type: string
                  minLength: 1
                  maxLength: 1000
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleDataResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/seo/deploy:
    post:
      operationId: deploySeo
      summary: Trigger site deploy (Vercel hook)
      description: Requires `VERCEL_DEPLOY_HOOK_URL` on the server. Returns 503 if not configured.
      tags: [SEO — Admin]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Deploy triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleDataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: Deploy hook failed
        "503":
          description: Deploy hook not configured

components:
  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: API key with required OAuth-style scopes on the key record.

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: perPage
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items: {}

    SingleDataResponse:
      type: object
      required: [data]
      properties:
        data: {}

    PaginatedDataResponse:
      type: object
      required: [data, meta, links]
      properties:
        data:
          type: array
          items: {}
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            perPage:
              type: integer
            totalPages:
              type: integer
        links:
          type: object
          properties:
            self:
              type: string
            next:
              type: string
              nullable: true
            prev:
              type: string
              nullable: true
            first:
              type: string
            last:
              type: string

    # ── Course schemas ───────────────────────────────────────
    Course:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        duration:
          type: number
        price:
          type: number
        discount:
          type: number
          nullable: true
        listPrice:
          type: number
          nullable: true
        isPopular:
          type: boolean
          nullable: true
        isTrending:
          type: boolean
          nullable: true
        activityType:
          type: string
          nullable: true
        deliveryType:
          type: string
          nullable: true
        thumbUrl:
          type: string
          nullable: true
        thumbAltText:
          type: string
          nullable: true
        splashUrl:
          type: string
          nullable: true
        splashAltText:
          type: string
          nullable: true
        previewUrl:
          type: string
          nullable: true
        ceBrokerId:
          type: string
          nullable: true
        uanPharmacists:
          type: string
          nullable: true
        uanPharmacyTechnician:
          type: string
          nullable: true
        accme:
          type: string
          nullable: true
        approvalNumber:
          type: string
          nullable: true
        stateApprovalNumber:
          type: string
          nullable: true
        agd:
          type: string
          nullable: true
        instantReportCeBroker:
          type: boolean
        reportCpeMonitor:
          type: boolean
        reportAgd:
          type: boolean
        about:
          description: Rich text / structured content
        learningObjectives:
          description: Rich text / structured content
        coursePreview:
          nullable: true
          description: Rich text / structured content
        disclosure:
          nullable: true
