    CreateJsonLdBody:
      type: object
      required: [url, schemaType, payload]
      properties:
        url:
          type: string
          minLength: 1
        schemaType:
          type: string
          minLength: 1
        payload:
          type: object
          additionalProperties: true

    UpdateJsonLdBody:
      type: object
      properties:
        schemaType:
          type: string
          minLength: 1
        payload:
          type: object
          additionalProperties: true

    CreateMetadataBody:
      type: object
      required: [url, payload]
      properties:
        url:
          type: string
          minLength: 1
        payload:
          $ref: "#/components/schemas/CreateMetadataPayload"

    MetadataTitleOverride:
      oneOf:
        - type: string
          description: Templated page title value
        - type: object
          required: [absolute]
          additionalProperties: false
          properties:
            absolute:
              type: string
              description: Final URL-specific title that bypasses the shared title template

    CreateMetadataPayload:
      type: object
      additionalProperties: true
      properties:
        title:
          $ref: "#/components/schemas/MetadataTitleOverride"
        description:
          type: string
          description: Meta description, maximum 160 characters
        keywords:
          type: array
          maxItems: 20
          items:
            type: string
        openGraph:
          type: object
          additionalProperties: true
        twitter:
          type: object
          additionalProperties: true

    CreateSiteWideBody:
      type: object
      required: [schemaType, payload]
      properties:
        schemaType:
          type: string
          minLength: 1
        payload:
          type: object
          additionalProperties: true

